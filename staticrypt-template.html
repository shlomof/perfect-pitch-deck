<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>/*[|template_title|]*/0</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Mona+Sans:wght@800&display=swap" rel="stylesheet" />

        <style>
            :root {
                --bg-dark: #000000;
                --surface: #FFFFFF;
                --text-primary: #000000;
                --text-inverse: #FFFFFF;
                --accent-blue: #1F5EFF;
                --accent-blue-soft: #C7DCFF;
                --warn: #ef4444;
            }

            * { box-sizing: border-box; }

            .staticrypt-html, .staticrypt-body {
                height: 100%;
                margin: 0;
                background: var(--bg-dark);
            }

            .staticrypt-body {
                font-family: 'Inter', system-ui, -apple-system, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
                color: var(--text-inverse);
            }

            .staticrypt-content {
                min-height: 100%;
                background: var(--bg-dark);
                position: relative;
                overflow: hidden;
            }

            .staticrypt-content::before {
                content: '';
                position: absolute;
                inset: 0;
                background: radial-gradient(ellipse 900px 500px at 50% 35%, rgba(31,94,255,0.18) 0%, rgba(0,0,0,0) 70%);
                pointer-events: none;
            }

            .staticrypt-page {
                position: relative;
                z-index: 1;
                width: 100%;
                max-width: 460px;
                margin: 0 auto;
                padding: 80px 24px 40px;
            }

            .brand-stack {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 48px;
            }

            .brand-mark {
                width: 56px;
                height: 56px;
                margin-bottom: 24px;
                color: var(--accent-blue);
            }
            .brand-mark svg { width: 100%; height: 100%; display: block; }

            .brand-wordmark {
                font-family: 'Mona Sans', 'Inter', sans-serif;
                font-weight: 800;
                font-size: 26px;
                line-height: 1.1;
                letter-spacing: -0.02em;
                color: var(--text-inverse);
                text-align: center;
            }

            .staticrypt-form {
                background: rgba(255,255,255,0.03);
                border: 1px solid rgba(31,94,255,0.30);
                border-radius: 16px;
                padding: 32px;
                text-align: left;
            }

            .staticrypt-instructions {
                margin: 0 0 24px;
            }

            .staticrypt-title {
                font-family: 'Inter', sans-serif;
                font-weight: 700;
                font-size: 22px;
                line-height: 1.2;
                letter-spacing: -0.02em;
                margin: 0 0 8px;
                color: var(--text-inverse);
            }

            .staticrypt-instructions p:not(.staticrypt-title) {
                margin: 0;
                font-size: 14px;
                line-height: 1.5;
                color: rgba(255,255,255,0.65);
            }

            .staticrypt-hr { display: none; }

            .staticrypt-password-container {
                position: relative;
                background: var(--bg-dark);
                border: 1px solid rgba(255,255,255,0.15);
                border-radius: 10px;
                margin: 0 0 14px;
                transition: border-color 0.15s ease;
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--accent-blue);
                box-shadow: 0 0 0 3px rgba(31,94,255,0.25);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                color: var(--text-inverse);
                font-family: 'Inter', sans-serif;
                font-size: 15px;
                outline: 0;
                padding: 14px 44px 14px 16px;
                width: 100%;
                letter-spacing: 0.01em;
            }
            .staticrypt-form input::placeholder {
                color: rgba(255,255,255,0.35);
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                width: 18px;
                opacity: 0.55;
                padding: 0;
                position: absolute;
                right: 14px;
                top: 50%;
                transform: translateY(-50%);
                filter: invert(1);
                transition: opacity 0.15s ease;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.9; }

            .staticrypt-form .staticrypt-decrypt-button {
                width: 100%;
                background: var(--accent-blue);
                color: var(--text-inverse);
                border: 0;
                border-radius: 10px;
                padding: 14px 16px;
                margin-top: 4px;
                font-family: 'Inter', sans-serif;
                font-size: 14px;
                font-weight: 700;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                cursor: pointer;
                transition: filter 0.15s ease, transform 0.05s ease;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover { filter: brightness(1.08); }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: translateY(1px); }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin: 6px 0 16px;
                font-size: 13px;
                color: rgba(255,255,255,0.65);
                cursor: pointer;
            }
            .staticrypt-remember input[type="checkbox"] {
                margin-right: 10px;
                accent-color: var(--accent-blue);
            }

            .session-tag {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-top: 28px;
                padding: 6px 12px;
                background: rgba(31,94,255,0.10);
                border: 1px solid rgba(31,94,255,0.30);
                border-radius: 999px;
                font-family: 'Inter', sans-serif;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--accent-blue-soft);
            }

            .footer-mark {
                text-align: center;
                margin-top: 32px;
                font-family: 'Inter', sans-serif;
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: rgba(255,255,255,0.35);
            }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2rem;
                height: 2rem;
                border: 0.25em solid rgba(31,94,255,0.25);
                border-right-color: var(--accent-blue);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media (max-width: 520px) {
                .staticrypt-page { padding: 56px 18px 32px; }
                .staticrypt-form { padding: 24px; }
                .brand-wordmark { font-size: 22px; }
            }
        </style>
    </head>

    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="staticrypt-page">
                <div class="brand-stack">
                    <div class="brand-mark" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 0 L13.6 9.4 L23 12 L13.6 14.6 L12 24 L10.4 14.6 L1 12 L10.4 9.4 Z"/>
                        </svg>
                    </div>
                    <div class="brand-wordmark">Perfect Pitch Deck</div>
                </div>

                <div class="staticrypt-form">
                    <div class="staticrypt-instructions">
                        <p class="staticrypt-title">/*[|template_title|]*/0</p>
                        <p>/*[|template_instructions|]*/0</p>
                    </div>

                    <hr class="staticrypt-hr" />

                    <form id="staticrypt-form" action="#" method="post">
                        <div class="staticrypt-password-container">
                            <input
                                id="staticrypt-password"
                                type="password"
                                name="password"
                                placeholder="/*[|template_placeholder|]*/0"
                                autofocus
                            />

                            <img
                                class="staticrypt-toggle-password-visibility"
                                alt="/*[|template_toggle_show|]*/0"
                                title="/*[|template_toggle_show|]*/0"
                                src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NDAgNTEyIj48cGF0aCBmaWxsPSJjdXJyZW50Q29sb3IiIGQ9Ik0zOC44IDUuMUMyOC40LTMuMSAxMy4zLTEuMiA1LjEgOS4yUy0xLjIgMzQuNyA5LjIgNDIuOWw1OTIgNDY0YzEwLjQgOC4yIDI1LjUgNi4zIDMzLjctNC4xczYuMy0yNS41LTQuMS0zMy43TDUyNS42IDM4Ni43YzM5LjYtNDAuNiA2Ni40LTg2LjEgNzkuOS0xMTguNGMzLjMtNy45IDMuMy0xNi43IDAtMjQuNmMtMTQuOS0zNS43LTQ2LjItODcuNy05My0xMzEuMUM0NjUuNSA2OC44IDQwMC44IDMyIDMyMCAzMmMtNjguMiAwLTEyNSAyNi4zLTE2OS4zIDYwLjhMMzguOCA1LjF6Ii8+PC9zdmc+"
                            />
                        </div>

                        <label id="staticrypt-remember-label" class="staticrypt-remember hidden">
                            <input id="staticrypt-remember" type="checkbox" name="remember" checked />
                            /*[|template_remember|]*/0
                        </label>

                        <input type="submit" class="staticrypt-decrypt-button" value="/*[|template_button|]*/0" />
                    </form>
                </div>

                <div style="text-align:center;">
                    <span class="session-tag">TODO: deck tagline</span>
                </div>

                <div class="footer-mark">TODO: deck footer</div>
            </div>
        </div>

        <script>
            // these variables will be filled when generating the file - the template format is '/*[|variable_name|]*/0'
            const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
            const templateError = "/*[|template_error|]*/0",
                templateToggleAltShow = "/*[|template_toggle_show|]*/0",
                templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
                isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
                staticryptConfig = /*[|staticrypt_config|]*/ 0;

            const templateConfig = {
                rememberExpirationKey: "staticrypt_expiration",
                rememberPassphraseKey: "staticrypt_passphrase",
                replaceHtmlCallback: null,
                clearLocalStorageCallback: null,
            };

            const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

            window.onload = async function () {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();

                if (!isSuccessful) {
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();

                    if (isRememberEnabled) {
                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                    }
                }
            };

            const toggleIcon = document.querySelector(".staticrypt-toggle-password-visibility");
            const imgSrcEyeClosed =
                "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NDAgNTEyIj48cGF0aCBmaWxsPSJjdXJyZW50Q29sb3IiIGQ9Ik0zOC44IDUuMUMyOC40LTMuMSAxMy4zLTEuMiA1LjEgOS4yUy0xLjIgMzQuNyA5LjIgNDIuOWw1OTIgNDY0YzEwLjQgOC4yIDI1LjUgNi4zIDMzLjctNC4xczYuMy0yNS41LTQuMS0zMy43TDUyNS42IDM4Ni43YzM5LjYtNDAuNiA2Ni40LTg2LjEgNzkuOS0xMTguNGMzLjMtNy45IDMuMy0xNi43IDAtMjQuNmMtMTQuOS0zNS43LTQ2LjItODcuNy05My0xMzEuMUM0NjUuNSA2OC44IDQwMC44IDMyIDMyMCAzMmMtNjguMiAwLTEyNSAyNi4zLTE2OS4zIDYwLjhMMzguOCA1LjF6Ii8+PC9zdmc+";
            const imgSrcEyeOpened =
                "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NzYgNTEyIj48cGF0aCBmaWxsPSJjdXJyZW50Q29sb3IiIGQ9Ik0yODggMzJjLTgwLjggMC0xNDUuNSAzNi44LTE5Mi42IDgwLjZDNDguNiAxNTYgMTcuMyAyMDggMi41IDI0My43Yy0zLjMgNy45LTMuMyAxNi43IDAgMjQuNkMxNy4zIDMwNCA0OC42IDM1NiA5NS40IDM5OS40QzE0Mi41IDQ0My4yIDIwNy4yIDQ4MCAyODggNDgwczE0NS41LTM2LjggMTkyLjYtODAuNmM0Ni44LTQzLjUgNzguMS05NS40IDkzLTEzMS4xYzMuMy03LjkgMy4zLTE2LjcgMC0yNC42Yy0xNC45LTM1LjctNDYuMi04Ny43LTkzLTEzMS4xQzQzMy41IDY4LjggMzY4LjggMzIgMjg4IDMyek0xNDQgMjU2YTE0NCAxNDQgMCAxIDEgMjg4IDAgMTQ0IDE0NCAwIDEgMSAtMjg4IDB6Ii8+PC9zdmc+";
            toggleIcon.addEventListener("click", function () {
                const passwordInput = document.getElementById("staticrypt-password");
                if (passwordInput.type === "password") {
                    passwordInput.type = "text";
                    toggleIcon.src = imgSrcEyeOpened;
                    toggleIcon.alt = templateToggleAltHide;
                    toggleIcon.title = templateToggleAltHide;
                } else {
                    passwordInput.type = "password";
                    toggleIcon.src = imgSrcEyeClosed;
                    toggleIcon.alt = templateToggleAltShow;
                    toggleIcon.title = templateToggleAltShow;
                }
            });

            document.getElementById("staticrypt-form").addEventListener("submit", async function (e) {
                e.preventDefault();

                const password = document.getElementById("staticrypt-password").value,
                    isRememberChecked = document.getElementById("staticrypt-remember").checked;

                const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);

                if (!isSuccessful) {
                    alert(templateError);
                }
            });
        </script>
    </body>
</html>
